<!DOCTYPE html>
<html>
<head>
    <title>Join Loyalty Program</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #f0f0f0; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .form-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a2b56; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-box">
        <h2 id="display-name">Loading...</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="Email Address">
        <button onclick="go()">Get My Card</button>
    </div>
    <script>
        fetch('/api/settings').then(res => res.json()).then(data => {
            document.getElementById('display-name').innerText = data.name;
        });
        function go() {
            const n = document.getElementById('name').value;
            const e = document.getElementById('email').value;
            if(n && e) window.location.href = `customer.html?name=${encodeURIComponent(n)}&email=${encodeURIComponent(e)}`;
        }
    </script>
</body>
</html>
