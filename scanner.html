<!DOCTYPE html>
<html>
<head>
    <title>Shop Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body style="text-align:center;">
    <h1>Scan Customer QR</h1>
    <div id="reader" style="width: 300px; margin: auto;"></div>
    <h2 id="result">Ready</h2>

    <script>
        const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        
        scanner.render((decodedText) => {
            // Stop the scanner so it doesn't double-scan
            scanner.clear(); 

            fetch('/add-stamp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: decodedText })
            })
            .then(res => res.text())
            .then(data => {
                alert(data);
                location.reload(); // Refresh to scan again
            })
            .catch(err => alert("Connection Error: " + err));
        });
    </script>
</body>
</html>
